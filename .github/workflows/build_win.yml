name: Build Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pyinstaller
        python -m pip install -r requirements.txt

    - name: Environment Diagnostic
      run: |
        python --version
        where python
        python -m pip list
        dir
        dir dashboard
        dir strategies

    - name: Build with PyInstaller
      run: |
        python -m PyInstaller `
        --onefile `
        --name BinanceTradingBot `
        --clean `
        --noconfirm `
        --add-data "dashboard/templates;dashboard/templates" `
        --add-data "strategies;strategies" `
        --hidden-import uvicorn.protocols.http.httptools_impl `
        --hidden-import uvicorn.protocols.http.h11_impl `
        --hidden-import uvicorn.protocols.http.auto_impl `
        --hidden-import uvicorn.protocols.websockets.websockets_impl `
        --hidden-import uvicorn.protocols.websockets.auto_impl `
        --hidden-import uvicorn.lifespan.on `
        --hidden-import uvicorn.lifespan.off `
        --hidden-import uvicorn.lifespan.auto `
        --hidden-import jinja2.ext `
        --hidden-import dotenv `
        --hidden-import email.mime.text `
        --hidden-import email.mime.multipart `
        --hidden-import engineio.async_drivers.threading `
        --hidden-import ccxt.base.exchange `
        --hidden-import yfinance `
        --hidden-import requests `
        --hidden-import feedparser `
        --hidden-import pytrends `
        --hidden-import lxml `
        dashboard_app.py

    - name: Upload Executable
      uses: actions/upload-artifact@v4
      with:
        name: BinanceTradingBot-Windows
        path: dist/BinanceTradingBot.exe
